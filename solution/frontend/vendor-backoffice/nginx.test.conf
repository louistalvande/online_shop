events {}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  server {
    listen 80;
    server_name vendor-backoffice _;

    root /workspace/vendor-backoffice/dist;

    location /api {
      proxy_pass http://backend:8080;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
    }

    location /uploads {
      proxy_pass http://backend:8080;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
    }

    # Strip /vendor/ prefix to map to dist/ (base='/vendor/' in vite.config)
    location ~ ^/vendor/(.*)$ {
      try_files /$1 /index.html;
    }

    location = / {
      return 302 /vendor/;
    }
  }
}
