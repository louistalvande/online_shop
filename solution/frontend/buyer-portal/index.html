<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Boutique en ligne</title>
    <meta name="robots" content="index,follow" />
    <meta property="og:type" content="website" />
    <meta property="og:locale" content="fr_FR" />
    <script src="https://js.stripe.com/v3/"></script>
  </head>
  <body>
    <script>
      try {
        var _t = JSON.parse(localStorage.getItem('shop_theme_v1') || 'null');
        if (_t) {
          var _r = document.documentElement;
          if (_t.accentColor) {
            _r.style.setProperty('--accent', _t.accentColor);
            var _n = parseInt(_t.accentColor.slice(1), 16);
            var _d = function(v) { return Math.max(0, v - 20).toString(16).padStart(2, '0'); };
            _r.style.setProperty('--accent-hover', '#' + _d(_n >> 16) + _d((_n >> 8) & 0xff) + _d(_n & 0xff));
          }
          if (_t.bgColor) _r.style.setProperty('--bg', _t.bgColor);
        }
      } catch(e) {}
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
