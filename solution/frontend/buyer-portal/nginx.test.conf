events {}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  server {
    listen 80;
    server_name buyer-portal _;

    root /workspace/buyer-portal/dist;

    location /api {
      proxy_pass http://backend:8080;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
    }

    location /uploads {
      proxy_pass http://backend:8080;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
    }

    # SPA — serve static assets or fall back to index.html (base='/' in vite.config)
    location / {
      try_files $uri $uri/ /index.html;
    }
  }
}
