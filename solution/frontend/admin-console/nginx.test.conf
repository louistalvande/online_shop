events {}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  server {
    listen 80;
    server_name admin-console _;

    root /workspace/admin-console/dist;

    location /api {
      proxy_pass http://backend:8080;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
    }

    location /uploads {
      proxy_pass http://backend:8080;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
    }

    # Strip /admin/ prefix to map to dist/ (base='/admin/' in vite.config)
    location ~ ^/admin/(.*)$ {
      try_files /$1 /index.html;
    }

    location = / {
      return 302 /admin/;
    }
  }
}
