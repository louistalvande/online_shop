          description: "Update status: UPDATED or ERROR"
        message:
          type: string
          description: "Error message when status is ERROR, null otherwise"
        product:
          $ref: "#/components/schemas/ProductResponse"
      description: Per-product update results
    UpdateLegalPageRequest:
