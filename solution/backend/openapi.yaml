openapi: 3.0.1
info:
  title: OpenAPI definition
  version: v0
servers:
- url: http://localhost
  description: Generated server url
tags:
- name: Announcements
  description: Public carousel announcements for the buyer portal
- name: Buyer — Stock subscriptions
  description: Back-in-stock email alert subscriptions
- name: Vendor Orders
  description: Vendor order management
- name: Vendor Catalog
  description: Product management for vendors
- name: Profile
  description: "Self-service profile management (US-PRF-01, US-PRF-02)"
- name: Public
  description: Reference data for checkout (no authentication required)
- name: Vendor — Campaigns
  description: Marketing email campaign endpoints for authenticated vendors
- name: Vendor — Legal Pages
  description: Legal page content management (vendor only)
- name: Public SEO
  description: Public SEO endpoints for the buyer portal and crawlers
- name: Admin — Carriers
  description: Carrier management for administrators
- name: Marketing Consent
  description: Vendor mailing list export (US-PRF-05)
- name: Vendor Announcements
  description: Image upload for announcement creation
- name: Delivery Addresses
  description: Buyer delivery address book (US-PRF-03)
- name: Vendor SEO
  description: SEO configuration for the shop and individual products
- name: Admin — Accounts
  description: Account management for administrators
- name: Admin — Settings
  description: Platform maintenance mode management
- name: Vendor Announcements
  description: CRUD and reordering of vendor announcements
- name: Vendor — Shop Config
  description: Global shop theme management (FS-V16)
- name: Shop Theme
  description: Public shop theme — no authentication required (FS-V16)
- name: Admin — Countries
  description: Eurozone country reference list
- name: Vendor — Catalog
  description: Product and stock management for vendors
- name: Admin — Audit Log
  description: Security audit log — admin access only (US-SEC-05)
- name: Auth
  description: Authentication — shared across all actors
- name: Orders
  description: Buyer order lifecycle
- name: Buyer — Cart
  description: Shopping cart management for authenticated buyers
- name: Buyer — Catalog
  description: Product catalog browsing for buyers and visitors
- name: Vendor - Reports
  description: Vendor sales reporting endpoints
paths:
  /api/vendor/seo:
    get:
      tags:
      - Vendor SEO
      summary: Get shop-wide SEO configuration
      operationId: getShopSeo
      responses:
        "200":
          description: Configuration returned
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ShopSeoResponse"
    put:
      tags:
      - Vendor SEO
      summary: Save shop-wide SEO configuration
      operationId: saveShopSeo
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ShopSeoRequest"
        required: true
      responses:
        "200":
          description: Configuration saved
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ShopSeoResponse"
  /api/vendor/seo/products/{productId}:
    get:
      tags:
      - Vendor SEO
      summary: Get SEO override for a product
      operationId: getProductSeo
      parameters:
      - name: productId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        "404":
          description: No override found for this product
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ProductSeoResponse"
        "200":
          description: Override returned
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ProductSeoResponse"
    put:
      tags:
      - Vendor SEO
      summary: Save SEO override for a product
      operationId: saveProductSeo
      parameters:
      - name: productId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductSeoRequest"
        required: true
      responses:
        "404":
          description: Product not found
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ProductSeoResponse"
        "200":
          description: Override saved
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ProductSeoResponse"
    delete:
      tags:
      - Vendor SEO
      summary: Delete SEO override for a product
      operationId: deleteProductSeo
      parameters:
      - name: productId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        "404":
          description: No override found for this product
        "204":
          description: Override deleted
  /api/vendor/products/{id}:
    get:
      tags:
      - Vendor — Catalog
      summary: Get a product
      operationId: getProduct
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        "404":
          description: Product not found
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ProductResponse"
        "200":
          description: Product returned
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ProductResponse"
    put:
      tags:
      - Vendor — Catalog
      summary: Update a product
      operationId: updateProduct
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProductRequest"
        required: true
      responses:
        "200":
          description: Product updated
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ProductResponse"
        "400":
          description: Invalid input
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ProductResponse"
        "404":
          description: Product not found
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ProductResponse"
  /api/vendor/announcements/{id}:
    put:
      tags:
      - Vendor Announcements
      summary: Update an announcement
      operationId: update
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAnnouncementRequest"
        required: true
      responses:
        "200":
          description: Announcement updated
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/AnnouncementResponse"
        "404":
          description: Announcement not found
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/AnnouncementResponse"
    delete:
      tags:
      - Vendor Announcements
      summary: Delete an announcement
      operationId: delete
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        "204":
          description: Announcement deleted
        "404":
          description: Announcement not found
  /api/profile/addresses/{addressId}:
    put:
      tags:
      - Delivery Addresses
      summary: Update a delivery address (US-PRF-03)
      operationId: updateAddress
      parameters:
      - name: addressId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeliveryAddressRequest"
        required: true
      responses:
        "400":
          description: Validation error
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/DeliveryAddressResponse"
        "200":
          description: Address updated
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/DeliveryAddressResponse"
        "404":
          description: Address not found
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/DeliveryAddressResponse"
    delete:
      tags:
      - Delivery Addresses
      summary: Delete a delivery address (US-PRF-03)
      operationId: deleteAddress
      parameters:
      - name: addressId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        "204":
          description: Address deleted
        "404":
          description: Address not found
        "409":
          description: Cannot delete the last active address
  /api/vendor/products:
    get:
      tags:
      - Vendor — Catalog
      summary: List vendor products
      operationId: listProducts
      responses:
        "200":
          description: Product list returned
          content:
            '*/*':
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProductResponse"
    post:
      tags:
      - Vendor — Catalog
      summary: Create a product
      operationId: createProduct
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProductRequest"
        required: true
      responses:
        "201":
          description: Product created
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ProductResponse"
        "400":
          description: Invalid input
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ProductResponse"
  /api/vendor/products/import:
    post:
      tags:
      - Vendor — Catalog
      summary: Import products from a CSV file
      operationId: importProducts
      requestBody:
        content:
          multipart/form-data:
            schema:
              required:
              - file
              type: object
              properties:
                file:
                  type: string
                  format: binary
      responses:
        "200":
          description: Import processed — may contain row-level errors
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/CsvImportResponse"
        "400":
          description: Empty file or invalid CSV header
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/CsvImportResponse"
  /api/vendor/products/images:
    post:
      tags:
      - Vendor Catalog
      summary: Upload a product image and receive its public URL
      operationId: upload
      requestBody:
        content:
          multipart/form-data:
            schema:
              required:
              - file
              type: object
              properties:
                file:
                  type: string
                  format: binary
      responses:
        "200":
          description: Image stored — public URL returned
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ProductImageUploadResponse"
        "403":
          description: Not a vendor account
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ProductImageUploadResponse"
        "400":
          description: Unsupported file type
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ProductImageUploadResponse"
        "401":
          description: Not authenticated
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ProductImageUploadResponse"
  /api/vendor/orders/{orderId}/waive-return:
    post:
      tags:
      - Vendor Orders
      summary: Accept post-shipment cancellation without return requirement (US-CAN-04)
      operationId: waiveReturn
      parameters:
      - name: orderId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VendorReturnRequest"
      responses:
        "422":
          description: Buyer IBAN missing for wire transfer order
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/OrderResponse"
        "200":
          description: "Cancellation accepted, refund triggered or wire initiated"
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/OrderResponse"
        "409":
          description: Order not in SHIPPED state
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/OrderResponse"
  /api/vendor/orders/{orderId}/ship:
    post:
      tags:
      - Vendor Orders
      summary: Declare order shipment with tracking number
      operationId: ship
      parameters:
      - name: orderId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ShipOrderRequest"
        required: true
      responses:
        "409":
          description: Order not in a shippable state
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/OrderResponse"
        "200":
          description: Order marked as shipped
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/OrderResponse"
  /api/vendor/orders/{orderId}/reject-wire:
    post:
      tags:
      - Vendor Orders
      summary: Reject wire transfer payment
      operationId: rejectWire
      parameters:
      - name: orderId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        "409":
          description: Order not in PAYMENT_PENDING_WIRE state
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/OrderResponse"
        "200":
          description: "Wire rejected, order cancelled"
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/OrderResponse"
  /api/vendor/orders/{orderId}/refuse-cancellation:
    post:
      tags:
      - Vendor Orders
      summary: Refuse buyer's post-shipment cancellation request (US-CAN-06)
      operationId: refuseCancellation
      parameters:
      - name: orderId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        "404":
          description: Order not found
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/OrderResponse"
        "200":
          description: "Cancellation refused, order back to SHIPPED"
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/OrderResponse"
        "409":
          description: Order not in CANCELLATION_REQUESTED_AFTER_SHIPMENT state
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/OrderResponse"
  /api/vendor/orders/{orderId}/prepare:
    post:
      tags:
      - Vendor Orders
      summary: Mark order as in preparation (US-VND-01)
      operationId: prepare
      parameters:
      - name: orderId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        "409":
          description: Order not in AWAITING_PROCESSING state
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/OrderResponse"
        "200":
          description: Order marked as in preparation
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/OrderResponse"
  /api/vendor/orders/{orderId}/confirm-wire:
    post:
      tags:
      - Vendor Orders
      summary: Confirm wire transfer receipt
      operationId: confirmWire
      parameters:
      - name: orderId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        "200":
          description: "Wire confirmed, order awaiting processing"
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/OrderResponse"
        "409":
          description: Order not in PAYMENT_PENDING_WIRE state
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/OrderResponse"
  /api/vendor/orders/{orderId}/confirm-wire-refund:
    post:
      tags:
      - Vendor Orders
      summary: Confirm wire refund has been sent to the buyer (US-CAN-05)
      operationId: confirmWireRefund
      parameters:
      - name: orderId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        "200":
          description: "Wire refund confirmed, order cancelled"
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/OrderResponse"
        "409":
          description: Order not in WIRE_REFUND_IN_PROGRESS state
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/OrderResponse"
  /api/vendor/orders/{orderId}/confirm-return:
    post:
      tags:
      - Vendor Orders
      summary: Confirm return parcel received and process refund (US-CAN-03)
      operationId: confirmReturn
      parameters:
      - name: orderId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        "409":
          description: Order not in PENDING_RETURN state
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/OrderResponse"
        "200":
          description: "Return confirmed, refund triggered"
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/OrderResponse"
  /api/vendor/orders/{orderId}/accept-return:
    post:
      tags:
      - Vendor Orders
      summary: Accept post-shipment cancellation with return requirement (US-CAN-03)
      operationId: acceptReturn
      parameters:
      - name: orderId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VendorReturnRequest"
      responses:
        "422":
          description: Buyer IBAN missing for wire transfer order
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/OrderResponse"
        "409":
          description: Order not in SHIPPED state
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/OrderResponse"
        "200":
          description: Order moved to PENDING_RETURN
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/OrderResponse"
  /api/vendor/campaigns/send:
    post:
      tags:
      - Vendor — Campaigns
      summary: Send a marketing email campaign to consenting buyers
      operationId: sendCampaign
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendCampaignRequest"
        required: true
      responses:
        "400":
          description: No consenting buyers (NO_CONSENTING_BUYERS) or validation error
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/CampaignSentResponse"
        "403":
          description: Not a vendor account
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/CampaignSentResponse"
        "200":
          description: Campaign sent
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/CampaignSentResponse"
  /api/vendor/announcements:
    get:
      tags:
      - Vendor Announcements
      summary: List all announcements for the authenticated vendor
      operationId: list
      responses:
        "200":
          description: List returned
          content:
            '*/*':
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AnnouncementResponse"
    post:
      tags:
      - Vendor Announcements
      summary: Create a new announcement
      operationId: create
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAnnouncementRequest"
        required: true
      responses:
        "400":
          description: Validation error
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/AnnouncementResponse"
        "201":
          description: Announcement created
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/AnnouncementResponse"
  /api/vendor/announcements/images:
    post:
      tags:
      - Vendor Announcements
      summary: Upload an announcement image and detect its orientation
      operationId: upload_1
      requestBody:
        content:
          multipart/form-data:
            schema:
              required:
              - file
              type: object
              properties:
                file:
                  type: string
                  format: binary
      responses:
        "200":
          description: Image stored — URL and orientation returned
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ImageUploadResponse"
        "400":
          description: Unsupported file type or unreadable image
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ImageUploadResponse"
  /api/profile/stock-subscriptions:
    get:
      tags:
      - Buyer — Stock subscriptions
      summary: List the buyer's active back-in-stock subscriptions
      operationId: listSubscriptions
      responses:
        "200":
          description: List returned
          content:
            '*/*':
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StockSubscriptionResponse"
    post:
      tags:
      - Buyer — Stock subscriptions
      summary: Subscribe to a back-in-stock alert for an out-of-stock product
      operationId: subscribe
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StockSubscriptionRequest"
        required: true
      responses:
        "409":
          description: Already subscribed or product is in stock
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/StockSubscriptionResponse"
        "404":
          description: Product not found
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/StockSubscriptionResponse"
        "201":
          description: Subscription created
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/StockSubscriptionResponse"
  /api/profile/addresses:
    get:
      tags:
      - Delivery Addresses
      summary: List buyer delivery addresses (US-PRF-03)
      operationId: listAddresses
      responses:
        "200":
          description: List returned
          content:
            '*/*':
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DeliveryAddressResponse"
    post:
      tags:
      - Delivery Addresses
      summary: Create a delivery address (US-PRF-03)
      operationId: createAddress
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeliveryAddressRequest"
        required: true
      responses:
        "400":
          description: Validation error
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/DeliveryAddressResponse"
        "422":
          description: Country not in Eurozone
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/DeliveryAddressResponse"
        "201":
          description: Address created
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/DeliveryAddressResponse"
  /api/orders:
    get:
      tags:
      - Orders
      summary: List all orders for the authenticated buyer
      operationId: getMyOrders
      responses:
        "200":
          description: Orders retrieved
          content:
            '*/*':
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OrderResponse"
    post:
      tags:
      - Orders
      summary: Create order from cart and initiate payment (US-ORD-01..04)
      operationId: initCheckout
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOrderRequest"
        required: true
      responses:
        "409":
          description: Carrier not available for the delivery country
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/CheckoutInitResponse"
        "422":
          description: Delivery country not in Eurozone
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/CheckoutInitResponse"
        "400":
          description: Invalid request or empty cart
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/CheckoutInitResponse"
        "201":
          description: Order created
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/CheckoutInitResponse"
  /api/orders/{orderId}/request-post-shipment-cancellation:
    post:
      tags:
      - Orders
      summary: Request post-shipment cancellation (US-CAN-06)
      operationId: requestPostShipmentCancellation
      parameters:
      - name: orderId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RequestPostShipmentCancellationRequest"
        required: true
      responses:
        "200":
          description: "Cancellation request recorded, vendor notified"
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/OrderResponse"
        "404":
          description: Order not found
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/OrderResponse"
        "422":
          description: Buyer IBAN missing for wire transfer order
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/OrderResponse"
        "400":
          description: Reason missing or request invalid
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/OrderResponse"
        "409":
          description: Order not in SHIPPED status
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/OrderResponse"
  /api/orders/{orderId}/confirm-payment:
    post:
      tags:
      - Orders
      summary: Confirm card payment after Stripe.js confirmation (US-ORD-03)
      operationId: confirmCardPayment
      parameters:
      - name: orderId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        "200":
          description: "Payment confirmed, order awaiting processing"
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/OrderResponse"
        "404":
          description: Order not found
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/OrderResponse"
        "402":
          description: Payment not succeeded
