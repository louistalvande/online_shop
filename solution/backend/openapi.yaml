          type: integer
          description: Number of products successfully updated
          format: int32
        totalErrors:
          type: integer
          description: Number of failed updates
          format: int32
        results:
          type: array
          description: Per-product update results
          items:
            $ref: "#/components/schemas/StockUpdateResult"
