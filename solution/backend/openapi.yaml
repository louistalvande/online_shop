components:
  schemas:
    UpdateProductRequest:
      required:
      - name
      - priceExclTax
      - quantity
      type: object
      properties:
        name:
          maxLength: 200
          minLength: 0
          type: string
          description: Product display name
          example: Aquarelle forêt d'automne
        description:
          type: string
          description: Optional detailed description of the product
        priceExclTax:
          minimum: 0.01
          exclusiveMinimum: false
          type: number
          description: Pre-tax unit price in euros
          example: 29.9
        category:
          maxLength: 100
          minLength: 0
          type: string
          description: Product category
          example: Aquarelle
        quantity:
          minimum: 0
          type: integer
          description: Available quantity in stock
          format: int32
          example: 10
        stockAlertThreshold:
          minimum: 0
          type: integer
          description: Stock alert threshold
          format: int32
          example: 3
        photoUrls:
          type: array
          description: Ordered list of photo URLs — replaces existing photos
          items:
            type: string
            description: Ordered list of photo URLs — replaces existing photos
    ProductResponse:
      type: object
      properties:
        id:
          type: string
          description: Product UUID
