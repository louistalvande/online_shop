          type: string
          description: "New shop background colour — 6-digit CSS hex (e.g. #f2f6f5);\
            \ null = no change"
        footerNotice:
          type: string
          description: New footer copyright / notice text; null = no change
    ShopThemeResponse:
      type: object
      properties:
        shopName:
          type: string
          description: Shop name displayed in the buyer-facing header; never null
        accentColor:
          type: string
          description: CSS hex accent colour for --accent; never null — defaults to
            the platform value
        bgColor:
          type: string
          description: CSS hex background colour for --bg; never null — defaults to
            the platform value
        logoUrl:
          type: string
          description: Public URL of the vendor logo file; null if no logo has been
            uploaded
        bannerUrl:
          type: string
          description: Public URL of the vendor hero banner; null if no banner has
            been uploaded
        footerNotice:
          type: string
          description: Footer copyright / notice text displayed in the buyer portal
            footer
    UpdateStockRequest:
      required:
      - quantity
      type: object
      properties:
        quantity:
          minimum: 0
          type: integer
          description: New available quantity in stock
          format: int32
          example: 15
        stockAlertThreshold:
          minimum: 0
          type: integer
          description: Stock alert threshold — alert triggered when quantity falls
            below this value
          format: int32
          example: 3
    BulkStockUpdateRequest:
      required:
      - updates
      type: object
      properties:
        updates:
          type: array
          description: List of per-product stock updates to apply
          items:
            $ref: "#/components/schemas/StockUpdateItem"
    StockUpdateItem:
      required:
      - productId
      - quantity
      type: object
      properties:
        productId:
          type: string
          description: Product identifier
          format: uuid
          example: 3fa85f64-5717-4562-b3fc-2c963f66afa6
        quantity:
          minimum: 0
          type: integer
          description: New available quantity in stock
          format: int32
          example: 15
        stockAlertThreshold:
          minimum: 0
          type: integer
          description: Stock alert threshold — alert triggered when quantity falls
            below this value
          format: int32
          example: 3
      description: List of per-product stock updates to apply
    BulkStockUpdateResponse:
      type: object
      properties:
