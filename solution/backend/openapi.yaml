components:
  schemas:
    ShopSeoRequest:
      type: object
      properties:
        seoTitle:
          type: string
          description: HTML title tag for the shop home page
        seoDescription:
          type: string
          description: Meta description for the shop home page
        seoKeywords:
          type: string
          description: Comma-separated meta keywords for the shop home page
        ogImageUrl:
          type: string
          description: Open Graph image URL used when sharing on social networks
        canonicalUrl:
          type: string
          description: Canonical URL for the shop home page
        robotsDisallowPaths:
          type: string
          description: Newline-separated paths to disallow in robots.txt
        sitemapChangefreq:
          type: string
          description: "Sitemap change-frequency hint (daily, weekly, monthly…)"
          example: weekly
        indexProducts:
          type: boolean
          description: Whether product detail pages should be indexed by search engines
        indexCatalog:
          type: boolean
          description: Whether the catalog listing page should be indexed by search
            engines
        googleVerification:
          type: string
          description: Google Search Console site verification token
        ga4Id:
          type: string
          description: Google Analytics 4 measurement ID (G-XXXXXXXXXX)
        bingVerification:
          type: string
          description: Bing Webmaster Tools site verification token
    ShopSeoResponse:
      type: object
      properties:
        seoTitle:
          type: string
          description: HTML title tag for the shop home page
        seoDescription:
          type: string
          description: Meta description for the shop home page
        seoKeywords:
          type: string
          description: Comma-separated meta keywords for the shop home page
        ogImageUrl:
          type: string
          description: Open Graph image URL
        canonicalUrl:
          type: string
          description: Canonical URL for the shop home page
        robotsDisallowPaths:
          type: string
          description: Newline-separated paths to disallow in robots.txt
        sitemapChangefreq:
          type: string
          description: Sitemap change-frequency hint
          example: weekly
        indexProducts:
          type: boolean
          description: Whether product pages are indexed
        indexCatalog:
          type: boolean
          description: Whether the catalog page is indexed
        googleVerification:
          type: string
          description: Google Search Console site verification token
        ga4Id:
          type: string
          description: Google Analytics 4 measurement ID
        bingVerification:
          type: string
          description: Bing Webmaster Tools site verification token
    ProductSeoRequest:
      type: object
      properties:
        seoTitle:
          type: string
          description: Custom SEO title for the product detail page (overrides product
            name)
        seoDescription:
          type: string
          description: Custom meta description for the product detail page
        seoKeywords:
          type: string
          description: Custom meta keywords for the product detail page
        ogImageUrl:
          type: string
          description: Custom Open Graph image URL for the product detail page
    ProductSeoResponse:
      type: object
      properties:
        productId:
          type: string
          description: Product UUID
          format: uuid
        seoTitle:
          type: string
          description: Custom SEO title (null means fall back to product name)
        seoDescription:
          type: string
          description: Custom meta description
        seoKeywords:
          type: string
          description: Custom meta keywords
        ogImageUrl:
          type: string
          description: Custom Open Graph image URL
    UpdateProductRequest:
      required:
      - name
      - priceExclTax
      - quantity
      type: object
      properties:
        name:
          maxLength: 200
          minLength: 0
          type: string
          description: Product display name
          example: Aquarelle forêt d'automne
        description:
          type: string
          description: Optional detailed description of the product
        priceExclTax:
          minimum: 0.01
          exclusiveMinimum: false
          type: number
          description: Pre-tax unit price in euros
          example: 29.9
        category:
          maxLength: 100
          minLength: 0
          type: string
          description: "Product type (poster, carte, affiche…)"
          example: Poster
        theme:
          maxLength: 100
          minLength: 0
          type: string
          description: "Product theme or occasion (paysage, naissance, vacances…)"
          example: Paysage
        quantity:
          minimum: 0
          type: integer
          description: Available quantity in stock
          format: int32
          example: 10
        stockAlertThreshold:
          minimum: 0
          type: integer
          description: Stock alert threshold
          format: int32
          example: 3
        photoUrls:
          type: array
          description: Ordered list of photo URLs — replaces existing photos
          items:
            type: string
            description: Ordered list of photo URLs — replaces existing photos
    ProductResponse:
      type: object
      properties:
        id:
          type: string
          description: Product UUID
          format: uuid
        slug:
          type: string
          description: URL-friendly slug used in public product URLs
        name:
          type: string
          description: Product display name
        description:
          type: string
          description: Product description
        priceExclTax:
          type: number
          description: Pre-tax unit price in euros
        category:
          type: string
          description: "Product type (poster, carte, affiche…)"
        theme:
          type: string
          description: "Product theme or occasion (paysage, naissance…)"
        quantity:
          type: integer
          description: Current available quantity in stock
          format: int32
        stockAlertThreshold:
          type: integer
          description: Stock alert threshold
          format: int32
        status:
