email.order.confirmation.body.html=<p>Bonjour,</p><p>Votre commande <strong>{0}</strong> d''un montant de <strong>{1} €</strong> a été confirmée et est en cours de traitement.</p><p>Cordialement,<br>L''équipe Online Shop</p>
