email.wire.transfer.body.html=<p>Bonjour,</p><p>Merci pour votre commande <strong>{0}</strong>. Pour finaliser votre achat, veuillez effectuer un virement de <strong>{1} €</strong> avec les coordonnées bancaires suivantes :</p><ul><li>IBAN : {2}</li><li>BIC : {3}</li><li>Référence : {0}</li></ul><p>Cordialement,<br>L''équipe Online Shop</p>
