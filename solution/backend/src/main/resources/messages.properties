email.wire.rejected.body.html=<p>Bonjour,</p><p>Votre commande <strong>{0}</strong> a été annulée car le paiement par virement bancaire n''a pas pu être confirmé par le vendeur. Le stock pré-réservé a été libéré.</p><p>Cordialement,<br>L''équipe Online Shop</p>
