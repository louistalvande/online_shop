email.password.revoked.body.html=<p>Hello,</p><p>For security reasons, your password has been administratively revoked. You must reset it within <strong>24 hours</strong> or your account will be suspended.</p><p><a href="{0}">Reset my password</a></p><p>If you did not request this action, please contact support.</p><p>Best regards,<br>The Online Shop Team</p>
