email.wire.transfer.body.html=<p>Hello,</p><p>Thank you for your order <strong>{0}</strong>. To complete your purchase, please wire <strong>€{1}</strong> to the following bank account:</p><ul><li>IBAN: {2}</li><li>BIC: {3}</li><li>Reference: {0}</li></ul><p>Best regards,<br>The Online Shop team</p>
