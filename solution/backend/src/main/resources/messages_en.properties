email.activation.subject=Activate your account
email.activation.body.html=<p>Hello,</p><p>Click the link below to activate your account:</p><p><a href="{0}">{0}</a></p><p>This link is valid for {1} hour(s).</p><p>Best regards,<br>The Online Shop team</p>
