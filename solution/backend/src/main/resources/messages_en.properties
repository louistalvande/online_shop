email.wire.rejected.body.html=<p>Hello,</p><p>Your order <strong>{0}</strong> has been cancelled because the wire transfer payment could not be confirmed by the vendor. Reserved stock has been released.</p><p>Best regards,<br>The Online Shop team</p>
