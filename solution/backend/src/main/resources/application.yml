spring:
  application:
    name: shop-api
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/${DB_NAME:shop}
    username: ${DB_USER:shop}
    password: ${DB_PASSWORD:dev}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
    clean-disabled: false
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

spring.messages:
  basename: messages
  encoding: UTF-8

server:
  port: 8080

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info

jwt:
  secret: ${JWT_SECRET:7Dir87ACMLA5aa9lDTydDPuoodj2VSCrBysALKDiDQA=}
  expiration-ms: 86400000
