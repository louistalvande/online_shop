spring:
  application:
    name: shop-api
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/${DB_NAME:shop}
    username: ${DB_USER:shop}
    password: ${DB_PASSWORD:dev}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
    clean-disabled: false
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

spring.messages:
  basename: messages
  encoding: UTF-8

server:
  port: 8080

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info

jwt:
  secret: ${JWT_SECRET:7Dir87ACMLA5aa9lDTydDPuoodj2VSCrBysALKDiDQA=}
  # 30 minutes — sliding window enforced by JwtFilter (US-SEC-01 / FS-S03)
  expiration-ms: 1800000
  cookie-name: jwt
  cookie-secure: ${JWT_COOKIE_SECURE:false}

app:
  # Comma-separated list of browser origins allowed to make credentialed cross-origin requests (US-SEC-02 / CPA-12)
  allowed-origins: ${APP_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5174,http://localhost:5175,http://buyer.localhost,http://vendor.localhost,http://admin.localhost,http://buyer-portal,http://vendor-backoffice,http://admin-console}
  # AES-256 key for TOTP secret column encryption (US-SEC-07 / FS-S08 / CPA-14).
  # Must be a Base64-encoded 32-byte (256-bit) random value.
  # NEVER commit a production key here — inject via TOTP_ENCRYPTION_KEY env var.
  # Dev default: openssl rand -base64 32 → replace before first production deploy.
  totp:
    # Dev default = Base64("test-encryption-key-32-bytes-123") — 32 bytes exactly.
    # MUST be replaced by a random `openssl rand -base64 32` value before production.
    encryption-key: ${TOTP_ENCRYPTION_KEY:dGVzdC1lbmNyeXB0aW9uLWtleS0zMi1ieXRlcy0xMjM=}
  activation-base-url: ${APP_ACTIVATION_BASE_URL:http://localhost:5073}
  activation-expiry-hours: 24
  password-reset-base-url: ${APP_PASSWORD_RESET_BASE_URL:http://localhost:5073}
  mfa:
    issuer: ${APP_MFA_ISSUER:OnlineShop}
  security:
    max-login-attempts: 5
    lockout-duration-seconds: 900
  upload-dir: ${APP_UPLOAD_DIR:uploads/announcements}
  upload-base-url: ${APP_UPLOAD_BASE_URL:/uploads/announcements}
  product-upload-dir: ${APP_PRODUCT_UPLOAD_DIR:uploads/products}
  product-upload-base-url: ${APP_PRODUCT_UPLOAD_BASE_URL:/uploads/products}

sendgrid:
  api-key: ${SENDGRID_API_KEY:}
  from-email: ${SENDGRID_FROM_EMAIL:noreply@shop.example.com}
  from-name: ${SENDGRID_FROM_NAME:Online Shop}

stripe:
  secret-key: ${STRIPE_SECRET_KEY:}
  public-key: ${STRIPE_PUBLIC_KEY:}

shop:
  bank:
    iban: ${SHOP_BANK_IBAN:FR7630006000011234567890189}
    bic: ${SHOP_BANK_BIC:BNPAFRPPXXX}
  public:
    base-url: ${SHOP_PUBLIC_BASE_URL:http://localhost:5173}
