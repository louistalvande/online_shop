name: shop

services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: shop
      POSTGRES_USER: shop
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shop"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DB_HOST: db
      DB_NAME: shop
      DB_USER: shop
      DB_PASSWORD: ${DB_PASSWORD:-changeme}
      REDIS_HOST: redis
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_COOKIE_SECURE: "true"
      APP_ALLOWED_ORIGINS: ${APP_ALLOWED_ORIGINS:-https://${NGINX_DOMAIN}}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      NGINX_DOMAIN: ${NGINX_DOMAIN:?NGINX_DOMAIN is required}
    volumes:
      # Let's Encrypt certificates managed by the certbot service
      - letsencrypt:/etc/letsencrypt:ro
      # ACME challenge webroot shared with Certbot
      - certbot_webroot:/var/www/certbot:ro
    depends_on:
      - backend

  # Certbot obtains and renews the TLS certificate automatically (US-SEC-03 / FS-S06)
  # On first deploy, run: docker compose run --rm certbot certonly --webroot -w /var/www/certbot -d ${NGINX_DOMAIN}
  certbot:
    image: certbot/certbot:latest
    restart: unless-stopped
    volumes:
      - letsencrypt:/etc/letsencrypt
      - certbot_webroot:/var/www/certbot
    # Check for renewal twice a day; Certbot only renews when < 30 days remain
    entrypoint: /bin/sh -c "trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h & wait $${!}; done"

volumes:
  pg_data:
  redis_data:
  letsencrypt:
  certbot_webroot:
