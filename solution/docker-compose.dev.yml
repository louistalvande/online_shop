name: shop

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: shop
      POSTGRES_USER: shop
      POSTGRES_PASSWORD: dev
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shop"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    ports:
      - "8080:8080"   # Spring Boot
      - "2222:22"     # VS Code Remote SSH
    environment:
      DB_HOST: db
      DB_NAME: shop
      DB_USER: shop
      DB_PASSWORD: dev
      REDIS_HOST: redis
      JWT_SECRET: 0va7bEp3sQZdN7oxr12ibeibvZOyPwnpV2qTCbRYhxg=
      APP_ACTIVATION_BASE_URL: http://localhost:5073
      APP_PASSWORD_RESET_BASE_URL: http://localhost:5073
    volumes:
      - ./backend:/workspace
      - backend-m2:/root/.m2
      - backend-vscode:/root/.vscode-server
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  buyer-portal:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
      args:
        NGINX_CONF: buyer-portal/nginx.dev.conf
    ports:
      - "5173:80"     # http://buyer.localhost:5173
      - "2223:22"     # VS Code Remote SSH
    environment:
      API_TARGET: http://backend:8080
    volumes:
      - ./frontend:/workspace
      - buyer-portal-vscode:/root/.vscode-server
    depends_on:
      - backend

  vendor-backoffice:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
      args:
        NGINX_CONF: vendor-backoffice/nginx.dev.conf
    ports:
      - "5174:80"     # http://vendor.localhost:5174
      - "2224:22"     # VS Code Remote SSH
    environment:
      API_TARGET: http://backend:8080
    volumes:
      - ./frontend:/workspace
      - vendor-backoffice-vscode:/root/.vscode-server
    depends_on:
      - backend

  admin-console:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
      args:
        NGINX_CONF: admin-console/nginx.dev.conf
    ports:
      - "5175:80"     # http://admin.localhost:5175
      - "2225:22"     # VS Code Remote SSH
    environment:
      API_TARGET: http://backend:8080
    volumes:
      - ./frontend:/workspace
      - admin-console-vscode:/root/.vscode-server
    depends_on:
      - backend

  e2e:
    image: mcr.microsoft.com/playwright:v1.60.0-jammy
    working_dir: /workspace/e2e
    environment:
      API_URL: http://backend:8080
      ADMIN_URL: http://admin-console
      BUYER_URL: http://buyer-portal
      VENDOR_URL: http://vendor-backoffice
      ADMIN_EMAIL: admin@onlineshop.com
      ADMIN_PASSWORD: Admin123456!
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: shop
      DB_PASSWORD: dev
      DB_NAME: shop
    volumes:
      - ./frontend/e2e:/workspace/e2e
    depends_on:
      - backend
      - buyer-portal
      - vendor-backoffice
      - admin-console
    profiles:
      - e2e
    command: ["sh", "-c", "npm install && npm run test:ci"]

volumes:
  backend-m2:
  backend-vscode:
  buyer-portal-vscode:
  vendor-backoffice-vscode:
  admin-console-vscode:
