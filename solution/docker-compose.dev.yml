services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: shop
      POSTGRES_USER: shop
      POSTGRES_PASSWORD: dev
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shop"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    ports:
      - "8080:8080"   # Spring Boot
      - "2222:22"     # VS Code Remote SSH
    environment:
      DB_HOST: db
      DB_NAME: shop
      DB_USER: shop
      DB_PASSWORD: dev
      REDIS_HOST: redis
      JWT_SECRET: 0va7bEp3sQZdN7oxr12ibeibvZOyPwnpV2qTCbRYhxg=
    volumes:
      - ./backend:/workspace
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "80:80"       # Nginx → buyer.localhost / vendor.localhost / admin.localhost
      - "2223:22"     # VS Code Remote SSH
    environment:
      API_TARGET: http://backend:8080
    volumes:
      - ./frontend:/workspace
    depends_on:
      - backend
