events { worker_connections 1024; }

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  server {
    listen 80;
    server_name _;

    # ── Security response headers (CPA-09 / US-SEC-02) ──────────────────────
    add_header X-Frame-Options          "DENY"                              always;
    add_header X-Content-Type-Options   "nosniff"                           always;
    add_header X-XSS-Protection         "1; mode=block"                    always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin"  always;
    add_header Content-Security-Policy  "default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data:; connect-src 'self'; frame-ancestors 'none'; form-action 'self'" always;
    # HSTS is added by Spring Security; Nginx adds it here as well for non-API responses
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Buyer Portal — default app
    location / {
      root /usr/share/nginx/html/buyer;
      try_files $uri $uri/ /index.html;
    }

    # Vendor Back-office
    location /vendor/ {
      root /usr/share/nginx/html;
      try_files $uri $uri/ /vendor/index.html;
    }

    # Admin Console
    location /admin/ {
      root /usr/share/nginx/html;
      try_files $uri $uri/ /admin/index.html;
    }

    # Backend API proxy
    location /api/ {
      proxy_pass http://backend:8080/api/;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;

      # Enforce HttpOnly + Secure + SameSite=Strict on every Set-Cookie from the backend
      # Defense-in-depth: Spring already sets these, Nginx re-enforces them (US-SEC-02 / FS-S05 / CPA-12)
      proxy_cookie_flags ~ HttpOnly Secure SameSite=Strict;
    }

    # Uploaded static files (product images, announcement images)
    location /uploads/ {
      proxy_pass http://backend:8080/uploads/;
      proxy_set_header Host            $host;
      proxy_set_header X-Real-IP       $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
  }
}
