# Production Nginx configuration — TLS 1.2/1.3 + HTTP→HTTPS redirect + security headers
# US-SEC-03 / FS-S06 / CS-13 / CPA-09
#
# Environment variables resolved at startup via envsubst (see Dockerfile):
#   NGINX_DOMAIN   — public domain name (e.g. shop.example.com)

events { worker_connections 1024; }

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  # ── HTTP: redirect all traffic to HTTPS + serve ACME challenge ────────────
  server {
    listen 80;
    server_name ${NGINX_DOMAIN};

    # Let's Encrypt HTTP-01 challenge (Certbot)
    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    # Permanent redirect — all other traffic goes to HTTPS
    location / {
      return 301 https://$host$request_uri;
    }
  }

  # ── HTTPS ─────────────────────────────────────────────────────────────────
  server {
    listen 443 ssl;
    http2 on;
    server_name ${NGINX_DOMAIN};

    # ── TLS certificate (Let's Encrypt via Certbot) ────────────────────────
    ssl_certificate     /etc/letsencrypt/live/${NGINX_DOMAIN}/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/${NGINX_DOMAIN}/privkey.pem;

    # ── TLS protocol and cipher hardening (CPA-09 / ANSSI-BP-076) ──────────
    # Only TLS 1.2 and 1.3 — SSLv3 / TLS 1.0 / TLS 1.1 are implicitly excluded
    ssl_protocols TLSv1.2 TLSv1.3;

    # Forward-secrecy ciphers for TLS 1.2 (TLS 1.3 mandates its own suites)
    ssl_ciphers ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;

    # Session resumption — improves performance without weakening security
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # OCSP stapling — speeds up handshake, reduces client round-trips
    ssl_stapling        on;
    ssl_stapling_verify on;
    resolver            1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout    5s;

    # ── Security response headers (CPA-09 / US-SEC-02) ─────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options           "DENY"                                         always;
    add_header X-Content-Type-Options    "nosniff"                                      always;
    add_header X-XSS-Protection          "1; mode=block"                               always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"             always;
    add_header Content-Security-Policy   "default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data:; connect-src 'self'; frame-ancestors 'none'; form-action 'self'" always;

    # ── Application locations ───────────────────────────────────────────────

    # Buyer Portal — default app
    location / {
      root /usr/share/nginx/html/buyer;
      try_files $uri $uri/ /index.html;
    }

    # Vendor Back-office
    location /vendor/ {
      root /usr/share/nginx/html;
      try_files $uri $uri/ /vendor/index.html;
    }

    # Admin Console
    location /admin/ {
      root /usr/share/nginx/html;
      try_files $uri $uri/ /admin/index.html;
    }

    # Backend API proxy
    location /api/ {
      proxy_pass http://backend:8080/api/;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;

      # Enforce HttpOnly + Secure + SameSite=Strict on every Set-Cookie from the backend
      # Defense-in-depth: Spring already sets these attributes (US-SEC-02 / FS-S05 / CPA-12)
      proxy_cookie_flags ~ HttpOnly Secure SameSite=Strict;
    }

    # Uploaded static files
    location /uploads/ {
      proxy_pass http://backend:8080/uploads/;
      proxy_set_header Host            $host;
      proxy_set_header X-Real-IP       $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
  }
}
