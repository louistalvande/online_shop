<?plantuml 1.2026.2?><svg contentStyleType='text/css' data-diagram-type='SALT' height='358px' preserveAspectRatio='none' style='width:378px;height:358px;background:#FFFFFF;' version='1.1' viewBox='0 0 378 358' width='378px' xmlns:xlink='http://www.w3.org/1999/xlink' xmlns='http://www.w3.org/2000/svg' zoomAndPan='magnify'><title>Back-office Vendeur &#8212; Annulation apr&#232;s exp&#233;dition</title><defs/><g><g class='title' data-source-line='1'><text fill='#000000' font-family='sans-serif' font-size='14' font-weight='bold' lengthAdjust='spacing' textLength='345.8301' x='15' y='29.5332'>Back-office Vendeur &#8212; Annulation apr&#232;s exp&#233;dition</text></g><text fill='#000000' font-family='sans-serif' font-size='14' font-weight='bold' lengthAdjust='spacing' textLength='363.1865' x='6.8218' y='59.1426'>Demande d'annulation &#8212; Commande #CMD-2025-0039</text><text fill='#000000' font-family='sans-serif' font-size='12' lengthAdjust='spacing' textLength='280.1719' x='6.8218' y='76.6758'>Acheteur : Bernard Claire &#8212; Exp&#233;di&#233;e le 12/01/2025</text><text fill='#000000' font-family='sans-serif' font-size='12' lengthAdjust='spacing' textLength='272.7949' x='6.8218' y='93.7695'>Motif d&#233;clar&#233; : Article non conforme &#224; la description</text><line style='stroke:#AAAAAA;stroke-width:1;' x1='6.8218' x2='371.0083' y1='100.9063' y2='100.9063'/><line style='stroke:#AAAAAA;stroke-width:1;' x1='6.8218' x2='371.0083' y1='102.9063' y2='102.9063'/><text fill='#000000' font-family='sans-serif' font-size='12' lengthAdjust='spacing' textLength='233.4551' x='6.8218' y='118.8633'>Choisissez le traitement de cette demande :</text><line style='stroke:#AAAAAA;stroke-width:1;' x1='6.8218' x2='371.0083' y1='127' y2='127'/><text fill='#000000' font-family='sans-serif' font-size='12' lengthAdjust='spacing' textLength='180.1055' x='26.8218' y='143.957'>Accepter avec condition de renvoi</text><ellipse cx='13.8218' cy='139.0469' fill='none' rx='5' ry='5' style='stroke:#000000;stroke-width:1.5;'/><ellipse cx='13.8218' cy='139.0469' fill='#000000' rx='2' ry='2' style='stroke:#000000;stroke-width:1.5;'/><text fill='#000000' font-family='sans-serif' font-size='12' lengthAdjust='spacing' textLength='171.7148' x='6.8218' y='161.0508'>L'acheteur doit renvoyer le colis.</text><text fill='#000000' font-family='sans-serif' font-size='12' lengthAdjust='spacing' textLength='302.8418' x='6.8218' y='178.1445'>Le remboursement sera d&#233;clench&#233; &#224; r&#233;ception du retour.</text><text fill='#000000' font-family='sans-serif' font-size='12' lengthAdjust='spacing' textLength='267.5039' x='6.8218' y='195.2383'>La commande passe en &#233;tat &#171; En attente retour &#187;.</text><line style='stroke:#AAAAAA;stroke-width:1;' x1='6.8218' x2='371.0083' y1='203.375' y2='203.375'/><text fill='#000000' font-family='sans-serif' font-size='12' lengthAdjust='spacing' textLength='180.1055' x='26.8218' y='220.332'>Accepter sans condition de renvoi</text><ellipse cx='13.8218' cy='215.4219' fill='none' rx='5' ry='5' style='stroke:#000000;stroke-width:1.5;'/><text fill='#000000' font-family='sans-serif' font-size='12' lengthAdjust='spacing' textLength='251.4375' x='6.8218' y='237.4258'>Remboursement imm&#233;diat sans retour du colis.</text><text fill='#000000' font-family='sans-serif' font-size='12' lengthAdjust='spacing' textLength='288.1816' x='6.8218' y='254.5195'>La commande passe directement en &#233;tat &#171; Annul&#233;e &#187;.</text><line style='stroke:#AAAAAA;stroke-width:1;' x1='6.8218' x2='371.0083' y1='262.6563' y2='262.6563'/><text fill='#000000' font-family='sans-serif' font-size='12' lengthAdjust='spacing' textLength='108.0645' x='26.8218' y='279.6133'>Refuser la demande</text><ellipse cx='13.8218' cy='274.7031' fill='none' rx='5' ry='5' style='stroke:#000000;stroke-width:1.5;'/><text fill='#000000' font-family='sans-serif' font-size='12' lengthAdjust='spacing' textLength='220.1309' x='6.8218' y='296.707'>La commande reste dans son &#233;tat actuel.</text><text fill='#000000' font-family='sans-serif' font-size='12' lengthAdjust='spacing' textLength='167.7246' x='6.8218' y='313.8008'>L'acheteur sera notifi&#233; du refus.</text><line style='stroke:#AAAAAA;stroke-width:1;' x1='6.8218' x2='371.0083' y1='321.9375' y2='321.9375'/><rect fill='#EEEEEE' height='19.0938' rx='5' ry='5' style='stroke:#000000;stroke-width:2.5;' width='252' x='9.3218' y='328.9375'/><text fill='#000000' font-family='sans-serif' font-size='12' lengthAdjust='spacing' textLength='155.4199' x='57.6118' y='343.3945'>Annuler]   [Valider la d&#233;cision</text><line style='stroke:#000000;stroke-width:1;' x1='5.8218' x2='371.0083' y1='43.6094' y2='43.6094'/><line style='stroke:#000000;stroke-width:1;' x1='5.8218' x2='371.0083' y1='351.5313' y2='351.5313'/><line style='stroke:#000000;stroke-width:1;' x1='5.8218' x2='5.8218' y1='43.6094' y2='63.2188'/><line style='stroke:#000000;stroke-width:1;' x1='371.0083' x2='371.0083' y1='43.6094' y2='63.2188'/><line style='stroke:#000000;stroke-width:1;' x1='5.8218' x2='5.8218' y1='266.1563' y2='283.25'/><line style='stroke:#000000;stroke-width:1;' x1='371.0083' x2='371.0083' y1='266.1563' y2='283.25'/><line style='stroke:#000000;stroke-width:1;' x1='5.8218' x2='5.8218' y1='206.875' y2='223.9688'/><line style='stroke:#000000;stroke-width:1;' x1='371.0083' x2='371.0083' y1='206.875' y2='223.9688'/><line style='stroke:#000000;stroke-width:1;' x1='5.8218' x2='5.8218' y1='147.5938' y2='164.6875'/><line style='stroke:#000000;stroke-width:1;' x1='371.0083' x2='371.0083' y1='147.5938' y2='164.6875'/><line style='stroke:#000000;stroke-width:1;' x1='5.8218' x2='5.8218' y1='97.4063' y2='105.4063'/><line style='stroke:#000000;stroke-width:1;' x1='371.0083' x2='371.0083' y1='97.4063' y2='105.4063'/><line style='stroke:#000000;stroke-width:1;' x1='5.8218' x2='5.8218' y1='317.4375' y2='325.4375'/><line style='stroke:#000000;stroke-width:1;' x1='371.0083' x2='371.0083' y1='317.4375' y2='325.4375'/><line style='