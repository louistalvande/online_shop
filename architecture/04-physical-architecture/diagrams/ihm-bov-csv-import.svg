<?plantuml 1.2026.2?><svg contentStyleType='text/css' data-diagram-type='SALT' height='314px' preserveAspectRatio='none' style='width:376px;height:314px;background:#FFFFFF;' version='1.1' viewBox='0 0 376 314' width='376px' xmlns:xlink='http://www.w3.org/1999/xlink' xmlns='http://www.w3.org/2000/svg' zoomAndPan='magnify'><title>PA-PHY-004 &#8212; Import CSV produits</title><defs/><g><g class='title' data-source-line='1'><text fill='#000000' font-family='sans-serif' font-size='14' font-weight='bold' lengthAdjust='spacing' textLength='239.2441' x='66.9766' y='29.5332'>PA-PHY-004 &#8212; Import CSV produits</text></g><text fill='#000000' font-family='sans-serif' font-size='14' font-weight='bold' lengthAdjust='spacing' textLength='200.71' x='6' y='59.1426'>Importer des produits via CSV</text><text fill='#000000' font-family='sans-serif' font-size='12' lengthAdjust='spacing' textLength='362.1973' x='6' y='76.6758'>Format attendu : nom,description,prix,categorie,quantite,seuil_alerte</text><text fill='#000000' font-family='sans-serif' font-size='12' lengthAdjust='spacing' textLength='188.0977' x='6' y='93.7695'>Colonnes obligatoires : nom et prix.</text><line style='stroke:#AAAAAA;stroke-width:1;' x1='6' x2='369.1973' y1='101.9063' y2='101.9063'/><rect fill='#EEEEEE' height='19.0938' rx='5' ry='5' style='stroke:#000000;stroke-width:2.5;' width='220' x='9.5' y='109.9063'/><text fill='#000000' font-family='sans-serif' font-size='12' lengthAdjust='spacing' textLength='146.7422' x='46.1289' y='124.3633'>S&#233;lectionner un fichier CSV</text><text fill='#000000' font-family='sans-serif' font-size='12' lengthAdjust='spacing' textLength='122.7422' x='234' y='119.8633'>catalogue_produits.csv</text><line style='stroke:#AAAAAA;stroke-width:1;' x1='6' x2='369.1973' y1='138' y2='138'/><text fill='#000000' font-family='sans-serif' font-size='14' font-weight='bold' lengthAdjust='spacing' textLength='130.1221' x='6' y='157.0332'>R&#233;sultat de l'import</text><text fill='#000000' font-family='sans-serif' font-size='12' lengthAdjust='spacing' textLength='167.373' x='6' y='174.5664'>3 produit(s) cr&#233;&#233;(s), 1 erreur(s).</text><line style='stroke:#AAAAAA;stroke-width:1;' x1='6' x2='369.1973' y1='182.7031' y2='182.7031'/><text fill='#000000' font-family='sans-serif' font-size='12' lengthAdjust='spacing' textLength='29.3613' x='7' y='200.6602'>Ligne</text><text fill='#000000' font-family='sans-serif' font-size='12' lengthAdjust='spacing' textLength='31.3535' x='38.3613' y='200.6602'>Statut</text><text fill='#000000' font-family='sans-serif' font-size='12' lengthAdjust='spacing' textLength='30.6797' x='73.7012' y='200.6602'>D&#233;tail</text><text fill='#000000' font-family='sans-serif' font-size='12' lengthAdjust='spacing' textLength='6.6738' x='7' y='217.7539'>2</text><text fill='#000000' font-family='sans-serif' font-size='12' lengthAdjust='spacing' textLength='26.0098' x='38.3613' y='217.7539'>Cr&#233;&#233;</text><text fill='#000000' font-family='sans-serif' font-size='12' lengthAdjust='spacing' textLength='137.0449' x='73.7012' y='217.7539'>Aquarelle for&#234;t d'automne</text><text fill='#000000' font-family='sans-serif' font-size='12' lengthAdjust='spacing' textLength='6.6738' x='7' y='234.8477'>3</text><text fill='#000000' font-family='sans-serif' font-size='12' lengthAdjust='spacing' textLength='26.0098' x='38.3613' y='234.8477'>Cr&#233;&#233;</text><text fill='#000000' font-family='sans-serif' font-size='12' lengthAdjust='spacing' textLength='136.7344' x='73.7012' y='234.8477'>Huile sur toile &#8212; paysage</text><text fill='#000000' font-family='sans-serif' font-size='12' lengthAdjust='spacing' textLength='6.6738' x='7' y='251.9414'>4</text><text fill='#000000' font-family='sans-serif' font-size='12' lengthAdjust='spacing' textLength='33.3398' x='38.3613' y='251.9414'>Erreur</text><text fill='#000000' font-family='sans-serif' font-size='12' lengthAdjust='spacing' textLength='114.0645' x='73.7012' y='251.9414'>Le prix est obligatoir